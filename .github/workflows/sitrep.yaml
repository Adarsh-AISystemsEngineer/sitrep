name: SitRep News Bot

on:
  schedule:
    # All times UTC (IST = UTC + 5:30)
    - cron: '30 1 * * *'    # 7:00 AM IST  — Morning digest
    - cron: '30 7 * * *'    # 1:00 PM IST  — Afternoon flash
    - cron: '0  13 * * *'   # 6:30 PM IST  — Evening sports
    - cron: '30 15 * * *'   # 9:00 PM IST  — Night tech
    - cron: '0  * * * *'    # Every hour   — Alert scan
    - cron: '30 * * * *'    # Every hour+30 — Alert scan

  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore seen alerts cache
        uses: actions/cache@v4
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}
          restore-keys: |
            seen-alerts-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SitRep
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          CURRENTS_API_KEY:   ${{ secrets.CURRENTS_API_KEY }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
        run: python run_once.py

      - name: Save seen alerts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_alerts.json
          key: seen-alerts-${{ github.run_id }}